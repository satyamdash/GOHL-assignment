version: v2

plugins:
  - remote: buf.build/protocolbuffers/go
    out: backend/gen
    opt: paths=source_relative

  - remote: buf.build/connectrpc/go
    out: backend/gen
    opt: paths=source_relative

  - remote: buf.build/bufbuild/es:v1.9.0
    out: frontend/src/gen
    opt: target=ts

  - remote: buf.build/connectrpc/es:v1.6.1
    out: frontend/src/gen
    opt: target=ts
